                <div class="fade-in">
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">⚠️ Job Safety Analysis (JSA)</h1>
                        <p class="text-gray-500">Form pengajuan analisis keselamatan kerja</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <form id="jsa-form" onsubmit="submitJSA(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pekerjaan</label>
                                    <input type="text" name="job_name" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Contoh: Perbaikan Mesin Produksi">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Department' : 'Departemen'}</label>
                                    <select name="department" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_department')}</option>
                                        ${getDepartmentOptions()}
                                    </select>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Location' : 'Lokasi'}</label>
                                    <input type="text" name="location" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Contoh: Area Produksi Line 1">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Job Steps' : 'Langkah-langkah Pekerjaan'}</label>
                                <textarea name="job_steps" rows="4" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Describe job steps in sequence' : 'Uraikan langkah-langkah pekerjaan secara berurutan'}"></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Potential Hazards' : 'Potensi Bahaya'}</label>
                                <textarea name="hazards" rows="3" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Identify hazards for each step' : 'Identifikasi potensi bahaya dari setiap langkah'}"></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Preventive Controls' : 'Tindakan Pencegahan'}</label>
                                <textarea name="controls" rows="3" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Describe preventive controls for each hazard' : 'Jelaskan tindakan pencegahan untuk setiap bahaya'}"></textarea>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Required PPE' : 'APD yang Diperlukan'}</label>
                                <textarea name="required_ppe" rows="2" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Example: Helmet, Gloves, Safety glasses' : 'Contoh: Helm, Sarung tangan, Safety glasses'}"></textarea>
                            </div>
                            <button type="submit" id="jsa-submit-btn" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-lg font-semibold hover:from-indigo-600 hover:to-purple-600 transition-all">
                                ${t('btn_submit_jsa')}
                            </button>
                        </form>
                    </div>
                </div>
