                <div class="fade-in">
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">${currentLanguage === 'en' ? '💬 Other Suggestions' : '💬 Saran Lainnya'}</h1>
                        <p class="text-gray-500">${currentLanguage === 'en' ? 'Provide suggestions and ideas for safety improvements' : 'Berikan saran, masukan, atau ide untuk perbaikan K3'}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <form id="saran-form" onsubmit="submitSaranLainnya(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Suggestion Category' : 'Kategori Saran'}</label>
                                    <select name="category" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_category')}</option>
                                        <option value="Perbaikan Prosedur K3">${currentLanguage === 'en' ? 'Safety Procedure Improvement' : 'Perbaikan Prosedur K3'}</option>
                                        <option value="Fasilitas K3">${currentLanguage === 'en' ? 'Safety Facilities' : 'Fasilitas K3'}</option>
                                        <option value="Pelatihan K3">${currentLanguage === 'en' ? 'Safety Training' : 'Pelatihan K3'}</option>
                                        <option value="Pengecekan Rutin">${currentLanguage === 'en' ? 'Routine Inspection' : 'Pengecekan Rutin'}</option>
                                        <option value="Perilaku Kerja Aman">${currentLanguage === 'en' ? 'Safe Work Behavior' : 'Perilaku Kerja Aman'}</option>
                                        <option value="Lainnya">${currentLanguage === 'en' ? 'Others' : 'Lainnya'}</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Department' : 'Departemen'}</label>
                                    <select name="department" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_department')}</option>
                                        ${getDepartmentOptions()}
                                    </select>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Location/Area (Optional)' : 'Lokasi/Area (Opsional)'}</label>
                                <input type="text" name="location" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Example: Production Area, Warehouse, Office' : 'Contoh: Area Produksi, Gudang, Kantor'}">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Suggestion Title' : 'Judul Saran'}</label>
                                <input type="text" name="title" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Example: Add more lighting in work area' : 'Contoh: Tambahan lampu di area kerja'}">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Suggestion Details' : 'Uraian Saran'}</label>
                                <textarea name="suggestion" rows="5" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Describe your suggestion in detail to improve workplace safety' : 'Jelaskan saran atau ide Anda secara detail untuk meningkatkan K3 di tempat kerja'}"></textarea>
                            </div>
                            <button type="submit" id="saran-submit-btn" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg font-semibold hover:from-purple-600 hover:to-pink-600 transition-all">
                                ${t('btn_submit_suggestion')}
                            </button>
                        </form>
                    </div>
                </div>
