                <div class="fade-in">
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-gray-800">${currentLanguage === 'en' ? '🚨 Unsafe Condition Report' : '🚨 Laporan Kondisi Tidak Aman'}</h1>
                        <p class="text-gray-500">${currentLanguage === 'en' ? 'Report any hazardous condition you find' : 'Laporkan kondisi berbahaya yang Anda temukan'}</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                        <form id="unsafe-form" onsubmit="submitKondisiTidakAman(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                                    <select name="category" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_category')}</option>
                                        <option value="Lantai Licin">${currentLanguage === 'en' ? 'Slippery/Wet Floor' : 'Lantai Licin/Basah'}</option>
                                        <option value="Instalasi Listrik">${currentLanguage === 'en' ? 'Hazardous Electrical Installation' : 'Instalasi Listrik Berbahaya'}</option>
                                        <option value="Kebocoran">${currentLanguage === 'en' ? 'Leakage (Gas/Liquid)' : 'Kebocoran (Gas/Cairan)'}</option>
                                        <option value="Peralatan Rusak">${currentLanguage === 'en' ? 'Damaged Equipment' : 'Peralatan Rusak'}</option>
                                        <option value="Pencahayaan">${currentLanguage === 'en' ? 'Insufficient Lighting' : 'Pencahayaan Kurang'}</option>
                                        <option value="Tumpahan Bahan Kimia">${currentLanguage === 'en' ? 'Chemical Spill' : 'Tumpahan Bahan Kimia'}</option>
                                        <option value="Akses Darurat">${currentLanguage === 'en' ? 'Emergency Access Blocked' : 'Akses Darurat Terhalang'}</option>
                                        <option value="Lainnya">${currentLanguage === 'en' ? 'Others' : 'Lainnya'}</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Risk Level' : 'Tingkat Bahaya'}</label>
                                    <select name="severity" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_level')}</option>
                                        <option value="Rendah">${currentLanguage === 'en' ? 'Low - Minor injury potential' : 'Rendah - Potensi cedera ringan'}</option>
                                        <option value="Sedang">${currentLanguage === 'en' ? 'Medium - Serious injury potential' : 'Sedang - Potensi cedera serius'}</option>
                                        <option value="Tinggi">${currentLanguage === 'en' ? 'High - Fatal/critical potential' : 'Tinggi - Potensi fatal/kritis'}</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Department' : 'Departemen'}</label>
                                    <select name="department" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                                        <option value="">${t('option_select_department')}</option>
                                        ${getDepartmentOptions()}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Specific Location' : 'Lokasi Spesifik'}</label>
                                    <input type="text" name="location" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Example: 2nd floor near restroom' : 'Contoh: Lantai 2 dekat toilet'}">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Condition Description' : 'Deskripsi Kondisi'}</label>
                                <textarea name="description" rows="4" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Describe the unsafe condition in detail' : 'Jelaskan kondisi tidak aman yang Anda temukan secara detail'}"></textarea>
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-1">${currentLanguage === 'en' ? 'Suggested Improvement' : 'Saran Perbaikan'}</label>
                                <textarea name="suggestion" rows="2" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="${currentLanguage === 'en' ? 'Provide improvement suggestion (optional)' : 'Berikan saran untuk memperbaiki kondisi ini (opsional)'}"></textarea>
                            </div>
                            <button type="submit" id="unsafe-submit-btn" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg font-semibold hover:from-amber-600 hover:to-orange-600 transition-all">
                                ${t('btn_submit_report')}
                            </button>
                        </form>
                    </div>
                </div>
